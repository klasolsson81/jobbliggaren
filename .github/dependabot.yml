# Dependabot — Jobbliggaren
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Ecosystems:
# - npm root (Husky-anchor) + npm web/jobbliggaren-web (faktisk frontend —
#   pnpm-lock.yaml autodetekteras; pnpm workspace catalogs GA 2025-02)
# - nuget root (Central Package Management — Directory.Packages.props)
# - github-actions (CI-workflows + lighthouse-ci-action supply-chain-yta)
#
# Strategi: månadsvisa version-updates, grupperade per ecosystem för att minska
# PR-brus. Security updates körs separat och ignorerar schedule (GitHub-default).
#
# CVE-täckning är CI-/Dependabot-formad, INTE agent-formad (security-auditor.md:292
# delegerar CVE-scan till Dependabot/CI — roster-gap-CTO 2026-05-17 §1.4, ADR 0045
# Beslut 4/5). Dependabot öppnar PRs; den blockerande severity-domen ligger i
# audit-jobbet (build.yml), observe-only Fas 1.

version: 2

updates:
  # Root package.json (Husky-anchor — lint-staged/husky-toolchain)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-all:
        patterns:
          - "*"

  # Frontend — web/jobbliggaren-web (Next.js 16 + pnpm; pnpm-lock.yaml
  # autodetekteras av npm-ekosystemet). Detta är den faktiska app-
  # dependency-ytan — root-entryn ovan täcker bara Husky-anchorn.
  - package-ecosystem: "npm"
    directory: "/web/jobbliggaren-web"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      web-minor-patch:
        update-types: ["minor", "patch"]

  # NuGet — Central Package Management (Directory.Packages.props i repo-root)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    # Refit major (>= 12) is deliberately gated: Refit 12 changes the error model
    # (IApiResponse<T> stops shadowing base members) and pulls in the ReactiveUI.Primitives
    # R3-bridge source generator, which emits PrimitivesR3BridgeGeneratedAttribute in every
    # transitive referent -> CS0436 duplicate-attribute conflict in referencing test projects.
    # It requires its own dedicated migration (see the Refit pin comment in
    # Directory.Packages.props and the tracking issue), not a grouped Dependabot bump.
    # Lift this ignore when the Refit 12 migration issue is executed.
    ignore:
      - dependency-name: "Refit"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Refit.HttpClientFactory"
        update-types: ["version-update:semver-major"]
    groups:
      nuget-all:
        patterns:
          - "*"

  # GitHub Actions — build.yml/deploy/lighthouse-ci-action supply-chain-yta
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-all:
        patterns:
          - "*"
